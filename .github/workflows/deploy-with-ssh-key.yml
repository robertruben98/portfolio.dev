name: Deploy to VPS (SSH Key)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  DEPLOY_PATH: '~/workspace-javascript/porfolio.dev'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type check & Build
        run: npm run build

      - name: 📊 Build summary
        run: |
          echo "### ✅ Build successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://porfolio.dev
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📲 Notify Telegram - Deploy Started
        continue-on-error: true  # notifications must never fail the deploy
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 *Deploy Started*
            
            📦 Repository: `${{ github.repository }}`
            🌿 Branch: `${{ github.ref_name }}`
            👤 Author: @${{ github.actor }}
            💬 Commit: `${{ github.event.head_commit.message }}`
            🔗 [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown

      - name: 🚀 Deploy to VPS via SSH (Key-based)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            echo "🔄 Starting deployment process..."
            
            # Verificar versiones de Docker
            echo "🔍 Docker version: $(docker --version)"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose --version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ Docker Compose no está instalado" >&2
              exit 1
            fi
            echo "🔍 Docker Compose command: $COMPOSE_CMD"
            
            # Habilitar BuildKit para builds más rápidos
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            
            # Navegar al directorio del proyecto
            cd ${{ env.DEPLOY_PATH }}
            echo "📂 Current directory: $(pwd)"
            
            # Obtener los últimos cambios
            echo "⬇️ Pulling latest changes from git..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            # Eliminar SOLO archivos sin seguimiento obsoletos bajo src/ (p.ej. componentes viejos
            # de blog que rompen el build). Acotado a src/ para no tocar backend/, node_modules/ ni .env.
            git clean -d --force -- src/ || true

            # Construir nuevas imágenes (con caché)
            echo "🏗️ Building new images..."
            $COMPOSE_CMD build
            
            # Crear backup tag de la imagen actual antes de actualizar
            echo "🔖 Tagging current image as backup..."
            docker tag porfoliodev-app:latest porfoliodev-app:backup-$(date +%Y%m%d-%H%M%S) 2>/dev/null || true
            
            # Actualizar contenedores (zero-downtime)
            echo "🔄 Updating containers..."
            $COMPOSE_CMD up -d --no-deps --build
            
            # Verificar que los contenedores estén corriendo
            echo "✅ Verifying deployment..."
            sleep 3
            
            # Health check con timeout
            for i in {1..10}; do
              if $COMPOSE_CMD ps | grep -q "Up"; then
                echo "✅ Deployment successful!"
                echo "🎉 Application is running"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "❌ Deployment failed! Containers are not running."
                $COMPOSE_CMD logs --tail=50
                exit 1
              fi
              sleep 1
            done
            
            # Limpiar imágenes antiguas (mantener últimas 3 backups)
            echo "🧹 Cleaning up old images..."
            docker images | grep 'porfoliodev-app.*backup' | awk '{print $1":"$2}' | tail -n +4 | xargs -r docker rmi || true
            
            # Limpiar recursos sin usar (async en background)
            nohup sh -c "docker image prune -f --filter 'dangling=true'" > /dev/null 2>&1 &
            
            echo "✨ Deployment completed successfully!"

      - name: 📝 Deployment summary
        if: success()
        run: |
          echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 URL: https://porfolio.dev" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 👤 Deployed by: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Telegram - Deploy Success
        if: success()
        continue-on-error: true  # notifications must never fail the deploy
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ *Deploy Successful!*
            
            🎉 Portfolio deployed to production
            🌍 URL: https://porfolio.dev
            📦 Commit: `${{ github.sha }}`
            👤 By: @${{ github.actor }}
            ⏱️ Duration: ${{ job.duration }} seconds
          format: markdown

      - name: �🔔 Notify on failure
        if: failure()
        run: |
          echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs for more details." >> $GITHUB_STEP_SUMMARY

      - name: 📲 Notify Telegram - Deploy Failed
        if: failure()
        continue-on-error: true  # notifications must never fail the deploy
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ *Deploy Failed!*
            
            🚨 Portfolio deployment failed
            📦 Repository: `${{ github.repository }}`
            🌿 Branch: `${{ github.ref_name }}`
            👤 Author: @${{ github.actor }}
            🔗 [Check Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown

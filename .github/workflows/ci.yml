name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Build/type-check only — intentionally independent of VPS deployment so the
# code-health badge never depends on infrastructure availability.
jobs:
  build:
    name: Type check & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type check & Build
        run: npm run build
